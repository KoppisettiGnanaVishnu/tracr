<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tracr</title>
<style>
  :root {
    --ink: #1c1b19;
    --paper: #f7f5f0;
    --line: #d8d3c6;
    --signal: #b14a30;
    --safe: #3c6e52;
    --muted: #7a7568;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Iowan Old Style", "Georgia", serif;
    padding: 48px 24px 80px;
  }

  .wrap { max-width: 880px; margin: 0 auto; }

  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-size: 34px;
    margin: 0;
    letter-spacing: 0.5px;
  }

  .tagline {
    font-family: "Courier New", monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .tagline button {
    background: none;
    border: none;
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    text-transform: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: color 0.15s, text-decoration-color 0.15s;
  }
  .tagline button:hover {
    color: var(--ink);
    text-decoration-color: var(--ink);
  }
  .tagline .sep { margin: 0 4px; }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    font-family: "Courier New", monospace;
  }

  input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: #fff;
    font-family: inherit;
    font-size: 14px;
  }

  button {
    padding: 10px 18px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    font-family: "Courier New", monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
  }
  button:hover { background: #3a3833; }

  .score-block {
    display: flex;
    align-items: center;
    gap: 28px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 28px;
    margin-bottom: 36px;
  }

  .score-number {
    font-size: 72px;
    font-weight: bold;
    line-height: 1;
    min-width: 130px;
  }

  .score-number.high { color: var(--safe); }
  .score-number.mid { color: #a07a1f; }
  .score-number.low { color: var(--signal); }

  .score-meta { font-family: "Courier New", monospace; font-size: 13px; color: var(--muted); }
  .score-meta div { margin-bottom: 4px; }
  .score-meta b { color: var(--ink); }

  .section-label {
    font-family: "Courier New", monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }

  table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }

  th {
    text-align: left;
    font-family: "Courier New", monospace;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    border-bottom: 1px solid var(--ink);
  }

  td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    vertical-align: top;
  }

  .tag {
    display: inline-block;
    font-family: "Courier New", monospace;
    font-size: 11px;
    padding: 2px 7px;
    border: 1px solid currentColor;
  }
  .tag.ai { color: #4a5a8c; }
  .tag.human { color: var(--muted); }
  .tag.risky { color: var(--signal); background: #f7e9e5; }
  .tag.ok { color: var(--safe); }

  code {
    font-family: "Courier New", monospace;
    font-size: 12.5px;
    color: #4a4640;
    word-break: break-word;
  }

  .empty {
    font-family: "Courier New", monospace;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
    text-align: center;
    border: 1px dashed var(--line);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Tracr</h1>
    <div class="tagline">
      <button onclick="scrollToTable()">Tracking</button><span class="sep">·</span><button onclick="openReviewPR()">Review</button><span class="sep">·</span><button onclick="explainCodeOrigin()">Code-origin</button><span class="sep">·</span><button onclick="loadRepo()">Record</button>
    </div>
  </header>

  <div class="controls">
    <input id="repoInput" placeholder="repo name, e.g. demo-repo" value="demo-repo" />
    <button onclick="loadRepo()">Load</button>
  </div>

  <div id="scoreArea"></div>

  <div class="section-label">Tracked code blocks</div>
  <div id="tableArea"></div>
</div>

<script>
async function loadRepo() {
  const repo = document.getElementById('repoInput').value.trim();
  if (!repo) return;

  const [scoreRes, blocksRes] = await Promise.all([
    fetch('/api/trust-score/' + encodeURIComponent(repo)),
    fetch('/api/code-blocks')
  ]);
  const score = await scoreRes.json();
  const allBlocks = await blocksRes.json();
  const blocks = allBlocks.filter(b => b.repo_name === repo);

  renderScore(score);
  renderTable(blocks);
}

function renderScore(score) {
  const area = document.getElementById('scoreArea');
  if (!score.breakdown) {
    area.innerHTML = '<div class="empty">No tracked code yet for this repo.</div>';
    return;
  }
  const s = score.score;
  const cls = s >= 80 ? 'high' : s >= 50 ? 'mid' : 'low';
  const b = score.breakdown;
  area.innerHTML = `
    <div class="score-block">
      <div class="score-number ${cls}">${s}</div>
      <div class="score-meta">
        <div><b>${b.total_blocks}</b> code blocks tracked</div>
        <div><b>${b.ai_percentage}%</b> AI-written &nbsp;·&nbsp; <b>${b.human_percentage}%</b> human-written</div>
        <div>AI code: <b>${b.ai_bugs}</b> bugs, <b>${b.ai_reverts}</b> reverts</div>
        <div>Human code: <b>${b.human_bugs}</b> bugs, <b>${b.human_reverts}</b> reverts</div>
      </div>
    </div>`;
}

function renderTable(blocks) {
  const area = document.getElementById('tableArea');
  if (blocks.length === 0) {
    area.innerHTML = '<div class="empty">No code blocks tracked for this repo yet.</div>';
    return;
  }
  const rows = blocks.map(b => `
    <tr>
      <td>${b.file_path}</td>
      <td><span class="tag ${b.is_ai_generated ? 'ai' : 'human'}">${b.is_ai_generated ? 'AI' : 'HUMAN'}</span></td>
      <td>${b.is_risky ? '<span class="tag risky">RISKY</span>' : '<span class="tag ok">CLEAR</span>'}</td>
      <td><code>${escapeHtml(b.code_snippet).slice(0, 80)}${b.code_snippet.length > 80 ? '…' : ''}</code></td>
    </tr>`).join('');

  area.innerHTML = `
    <table>
      <thead><tr><th>File</th><th>Origin</th><th>Risk</th><th>Snippet</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadRepo();

function scrollToTable() {
  document.getElementById('tableArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openReviewPR() {
  window.open('https://github.com/KoppisettiGnanaVishnu/tracr-demo-repo/pull/1', '_blank');
}

function explainCodeOrigin() {
  alert(
    "Code-origin tracking:\n\n" +
    "Tracr tags each code block as either AI-generated or human-written.\n\n" +
    "Right now this tagging happens via direct API input (see the README's " +
    "\"Try it yourself\" section). A VS Code extension for automatic detection " +
    "is planned as the next step \u2014 see pocDetector.js in the repo for an " +
    "early proof-of-concept."
  );
}
</script>
</body>
</html>
